name: "Merge Branch Rule Check"

on:
  pull_request:
    types: [opened, synchronized, reopened, edited]

jobs:
  merge-branch-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Merge Rules
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "=========================================="
          echo "🔍 Merge Rule Validation"
          echo "=========================================="
          echo "🔹 Source (From): $HEAD_REF"
          echo "🔹 Target (To)  : $BASE_REF"
          echo "------------------------------------------"

          # ---------------------------------------------------------
          # Case 1: Release Branch へのマージ
          # Rule: support/* からのみ許可
          # ---------------------------------------------------------
          if [[ "$BASE_REF" == release/* ]]; then
            echo "Checking rules for Release branch..."
            
            if [[ "$HEAD_REF" != support/* ]]; then
              echo "::error title=Rule Violation::⛔ Invalid Merge Source for Release!"
              echo "Error: You can ONLY merge into 'release/*' from 'support/*' branches."
              echo "Current Source: $HEAD_REF"
              exit 1
            fi

            echo "✅ Rule Passed: Merging from support branch."
            exit 0
          fi

          # ---------------------------------------------------------
          # Case 2: Support Branch へのマージ
          # Rule: 
          #   1. support/* (Cascade) -> OK (Version check skip)
          #   2. feature/*, hotfix/* -> Version check required
          #   3. Others -> NG
          # ---------------------------------------------------------
          if [[ "$BASE_REF" == support/* ]]; then
            echo "Checking rules for Support branch..."

            # 2-1. Cascade Merge (support -> support)
            if [[ "$HEAD_REF" == support/* ]]; then
              echo "ℹ️ Cascade merge detected (support -> support)."
              echo "✅ Skipping version check."
              exit 0
            fi
            
            # 2-2. Check Branch Type (feature/hotfix only)
            if [[ "$HEAD_REF" != feature/* ]] && [[ "$HEAD_REF" != hotfix/* ]]; then
              echo "::error title=Invalid Branch Type::⛔ Forbidden Branch Type!"
              echo "Error: You can only merge 'feature/*' or 'hotfix/*' into 'support/*'."
              echo "Current Source: $HEAD_REF"
              exit 1
            fi
            
            # 2-3. Version Consistency Check
            SOURCE_VER=$(echo "$HEAD_REF" | cut -d'/' -f2)
            TARGET_VER=$(echo "$BASE_REF" | cut -d'/' -f2)
            
            echo "🔎 Verifying Versions: $SOURCE_VER (Source) vs $TARGET_VER (Target)"

            if [ "$SOURCE_VER" != "$TARGET_VER" ]; then
              echo "::error title=Version Mismatch::⛔ Version numbers do not match!"
              echo "Error: You are trying to merge a '$SOURCE_VER' branch into a '$TARGET_VER' branch."
              echo "Please check your branch names."
              exit 1
            fi

            echo "✅ Rule Passed: Versions match ($SOURCE_VER)."
            exit 0
          fi

          # ---------------------------------------------------------
          # Case 3: Other Branches (Skip)
          # ---------------------------------------------------------
          echo "⏩ Target branch is neither release nor support. Skipping checks."
          exit 0