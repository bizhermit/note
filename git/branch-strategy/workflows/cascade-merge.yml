name: "Auto Cascade Merge"

on:
  push:
    branches:
      - "support/*"

concurrency:
  group: cascade-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  cascade-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PA_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Determine Next Version Branch
        id: determine-target
        run: |
          CURRENT_BRANCH="${{ github.ref_name }}"
          echo "Current Branch: $CURRENT_BRANCH"

          # リモート情報を最新化
          git fetch --prune

          # ---------------------------------------------------------
          # ブランチリスト生成ロジック
          # 1. git branch -r             : リモートブランチ全取得
          # 2. grep -v "\->"             : "HEAD -> ..." の行を除外
          # 3. grep "origin/support/"    : supportブランチのみ抽出
          # 4. sed ...                   : "  origin/" を削除してローカル名に整形
          # 5. sort -V                   : バージョン順にソート
          # ---------------------------------------------------------
          BRANCH_LIST=$(git branch -r | grep -v "\->" | grep "origin/support/" | sed 's/^[[:space:]]*origin\///' | sort -V)

          echo "Sorted Branch List:"
          echo "$BRANCH_LIST"

          TARGET_BRANCH=""
          FOUND_CURRENT=false
          
          # 次バージョンを探索
          while IFS= read -r branch; do
            # 空行対策
            if [ -z "$branch" ]; then continue; fi

            if [ "$FOUND_CURRENT" = true ]; then
              TARGET_BRANCH="$branch"
              break
            fi
            
            if [ "$branch" = "$CURRENT_BRANCH" ]; then
              FOUND_CURRENT=true
            fi
          done <<< "$BRANCH_LIST"

          if [ -z "$TARGET_BRANCH" ]; then
            echo "ℹ️ This is the latest version. No target branch."
            echo "HAS_TARGET=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Target Branch Found: $TARGET_BRANCH"
            echo "HAS_TARGET=true" >> $GITHUB_OUTPUT
            echo "BASE_BRANCH=$TARGET_BRANCH" >> $GITHUB_OUTPUT
            echo "HEAD_BRANCH=$CURRENT_BRANCH" >> $GITHUB_OUTPUT
          fi

      - name: Merge to Next Version
        if: steps.determine-target.outputs.HAS_TARGET == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PA_TOKEN }}
          HEAD_BRANCH: ${{ steps.determine-target.outputs.HEAD_BRANCH }}
          BASE_BRANCH: ${{ steps.determine-target.outputs.BASE_BRANCH }}
        run: |
          echo "🚀 Processing Cascade Merge: $HEAD_BRANCH -> $BASE_BRANCH"
          
          # リモートの最新状態を強制的にチェックアウトしてリセット
          git checkout -B $BASE_BRANCH origin/$BASE_BRANCH
          
          echo "Attempting to merge origin/${HEAD_BRANCH}..."
          
          if git merge origin/${HEAD_BRANCH} --no-edit; then
            echo "✅ Merge successful. Pushing..."
            git push origin ${BASE_BRANCH}
          else
            echo "⚠️ Merge failed. Creating PR..."
            git merge --abort
            gh label create "auto-merge-conflict" --color "b60205" --description "Created by CI" || true
            gh pr create \
              --base ${BASE_BRANCH} \
              --head ${HEAD_BRANCH} \
              --title "🔀 Auto-merge: ${HEAD_BRANCH} to ${BASE_BRANCH}" \
              --body "Automatic merge failed due to conflicts. Please resolve manually." \
              --label "auto-merge-conflict" \
              || echo "PR likely already exists."
          fi