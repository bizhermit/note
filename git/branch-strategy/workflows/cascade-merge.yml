name: "Cascade Merge: v0 -> v1"

on:
  push:
    branches:
      - "support/v0"

concurrency:
  group: cascade-v0-to-v1
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    env:
      HEAD_BRANCH: "support/v0" # マージ元（旧バージョン）
      BASE_BRANCH: "support/v1" # マージ先（新バージョン）
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: support/v1 # env が使えないため、BASE_BRANCH と同じ値を記述する
          fetch-depth: 0
          token: ${{ secrets.PA_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Try Merge or Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin ${HEAD_BRANCH}
          echo "Attempting to merge ${HEAD_BRANCH} into ${BASE_BRANCH}..."
          if git merge origin/${HEAD_BRANCH} --no-edit; then
            echo "✅ Merge successful. Pushing to ${BASE_BRANCH}..."
            git push origin ${BASE_BRANCH}
          else
            echo "⚠️ Merge failed (Conflict). Creating Pull Request..."
            git merge --abort
            
            gh pr create \
              --base ${BASE_BRANCH} \
              --head ${HEAD_BRANCH} \
              --title "🔀 Auto-merge: ${HEAD_BRANCH} to ${BASE_BRANCH}" \
              --body "Automatic merge failed due to conflicts. Please resolve manually." \
              --label "auto-merge-conflict" \
              || echo "PR likely already exists."
          fi