name: "Branch Version Check"

on:
  pull_request:
    branches:
      - "support/*"
    types: [opened, synchronized, reopened, edited]

jobs:
  check-version-match:
    runs-on: ubuntu-latest
    steps:
      - name: Check version consistency
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "Checking version match between:"
          echo "  Source: $HEAD_REF"
          echo "  Target: $BASE_REF"

          if [[ "$HEAD_REF" == support/* ]]; then
            echo "ℹ️ Cascade merge detected (support branch). Skipping version check."
            exit 0
          fi

          if [[ "$HEAD_REF" != feature/* ]] && [[ "$HEAD_REF" != hotfix/* ]]; then
            echo "::error::Invalid Branch Type! Source branch must be feature/*, hotfix/*, or support/*."
            exit 1
          fi

          SOURCE_VER=$(echo "$HEAD_REF" | cut -d'/' -f2)
          TARGET_VER=$(echo "$BASE_REF" | cut -d'/' -f2)

          if [ "$SOURCE_VER" != "$TARGET_VER" ]; then
            echo "::error::Version Mismatch! You are trying to merge '$SOURCE_VER' into '$TARGET_VER'."
            echo "Error: Source branch version ($SOURCE_VER) does not match Target branch version ($TARGET_VER)."
            exit 1
          else
            echo "✅ Version match confirmed: $SOURCE_VER == $TARGET_VER"
          fi